# 개발 모드: 코드 수정 시 자동 반영 (hot reload)
# 사용: docker compose -f docker-compose.dev.yml up --build

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB:       ringle_ai_tutor_development
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout:  5s
      retries:  10
    ports:
      - "5432:5432"

  backend:
    build:
      context:    ./backend
      dockerfile: Dockerfile
    working_dir: /app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV:           development
      DATABASE_URL:        postgresql://postgres:password@db:5432/ringle_ai_tutor_development
      OPENAI_API_KEY:      ${OPENAI_API_KEY}
      CORS_ORIGINS:        http://localhost:5173
      RAILS_LOG_TO_STDOUT: "true"
      SECRET_KEY_BASE:     dev_secret_key_base
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app          # 코드 변경 즉시 반영
      - bundle_cache:/usr/local/bundle

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules       # node_modules는 컨테이너 내부 것 사용
    depends_on:
      - backend

volumes:
  postgres_data:
  bundle_cache:
